<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutors Valley</title>
    
    <!-- Messenger to Chrome Script -->
    <script>
        function forceExternalBrowser() {
            var ua = navigator.userAgent || navigator.vendor || window.opera;
            var isFB = (ua.indexOf("FBAN") > -1) || (ua.indexOf("FBAV") > -1) || (ua.indexOf("Messenger") > -1);
            if (isFB && ua.indexOf("Android") > -1) {
                var currentUrl = window.location.href;
                window.location.href = "intent://" + currentUrl.replace(/^https?:\/\//, "") + "#Intent;scheme=https;package=com.android.chrome;end";
            }
        }
        forceExternalBrowser();
    </script>

    <!-- Google Fonts (20 fonts) -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto&family=Open+Sans&family=Lato&family=Montserrat&family=Poppins&family=Ubuntu&family=Playfair+Display&family=Hind+Siliguri&family=Noto+Sans+Bengali&family=Anek+Bangla&family=Mina&family=Atma&family=SolaimanLipi&family=Kalpurush&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Main Website -->
    <div id="main-app">
        <!-- Top Nav -->
        <div class="top-nav">
            <div class="role-selector">
                <span>View as:</span>
                <button onclick="setRole('guest')" id="btn-guest">Guest</button>
                <button onclick="setRole('guardian')" id="btn-guardian">Guardian</button>
                <button onclick="setRole('tutor')" id="btn-tutor">Tutor</button>
            </div>
            <a id="fb-link-ui" href="#" target="_blank" class="fb-btn">Facebook Page</a>
        </div>

        <!-- Hidden Admin Trigger (Bottom Left) -->
        <div class="admin-trigger" onclick="adminAuth()">
            <i class="fas fa-shield-alt"></i>
        </div>

        <!-- Admin Gear Icon (Only visible after admin login) -->
        <div id="admin-gear" style="display: none;" onclick="toggleSettings()">
            <i class="fas fa-cog"></i>
        </div>

        <!-- Header Banner -->
        <header id="header-banner">
            <div id="watermark-layer"></div>
            <div class="header-content">
                <img id="main-logo" src="https://via.placeholder.com/100" alt="Logo">
                <h1 id="brand-name">Tutors Valley</h1>
                <p id="motto-text">ঢাকার শহরে আমরাই দিচ্ছি সেরা টিউটর</p>
            </div>
        </header>

        <!-- Tutor Gender Filter (Visible only to Tutors) -->
        <div id="tutor-controls" class="section-container" style="display: none;">
            <h3>Select Gender to Join Groups:</h3>
            <select id="gender-filter" onchange="renderCards()">
                <option value="">-- Select Gender --</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>

        <!-- Zone Cards Grid -->
        <div id="cards-grid" class="cards-container"></div>

        <!-- Review Section -->
        <section class="section-container">
            <h2 id="review-title-ui">User Reviews</h2>
            <div id="reviews-list"></div>
            <div id="review-input-box">
                <input type="text" id="reviewer-name" placeholder="Your Name">
                <textarea id="user-review" placeholder="Write your review..."></textarea>
                <button onclick="submitReview()">Post Review</button>
            </div>
        </section>

        <!-- CEO Info -->
        <section id="ceo-section" class="section-container">
            <img id="ceo-image" src="https://via.placeholder.com/150" alt="CEO">
            <div id="ceo-text-content">
                <h3 id="ceo-name-ui">CEO Name</h3>
                <p id="ceo-bio-ui">CEO Designation & Bio</p>
            </div>
        </section>

        <footer>
            <p id="copyright-ui">© 2024 Tutors Valley. All Rights Reserved.</p>
        </footer>
    </div>

    <!-- Admin Settings Panel -->
    <div id="settings-panel" class="settings-sidebar">
        <div class="settings-header">
            <h3>Admin Controls</h3>
            <span onclick="toggleSettings()" style="cursor:pointer;">&times;</span>
        </div>
        <div class="settings-body">
            <h4>Banner & Branding</h4>
            <label>Banner Color:</label> <input type="color" id="cfg-banner-bg">
            <label>Logo URL:</label> <input type="text" id="cfg-logo-url">
            <label>Brand Name:</label> <input type="text" id="cfg-brand-name">
            <label>Motto Text:</label> <input type="text" id="cfg-motto-text">
            <label>FB Link:</label> <input type="text" id="cfg-fb-link">
            
            <h4>Watermark</h4>
            <label>Watermark Image URL:</label> <input type="text" id="cfg-watermark-url">
            <label>Opacity:</label> <input type="range" id="cfg-watermark-op" min="0" max="1" step="0.1">

            <h4>Zone Cards</h4>
            <div id="cfg-cards-list"></div>
            <button onclick="addNewCardConfig()">+ Add New Card</button>

            <h4>CEO Info</h4>
            <label>CEO Image URL:</label> <input type="text" id="cfg-ceo-img">
            <label>CEO Name:</label> <input type="text" id="cfg-ceo-name">
            <label>CEO Bio:</label> <textarea id="cfg-ceo-bio"></textarea>

            <button onclick="saveAllSettings()" class="save-btn">SAVE ALL CHANGES</button>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
