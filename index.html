<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutors Valley</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&family=Roboto:wght@400;500;700&family=Open+Sans:wght@400;600;700&family=Lato:wght@400;700&family=Montserrat:wght@400;600;700&family=Noto+Sans+Bengali:wght@400;500;700&family=SolaimanLipi:wght@400;600;700&family=Baloo+Da+2:wght@400;600;800&family=Mukta:wght@400;600;800&family=Arial:wght@400;700&family=Georgia:wght@400;700&family=Verdana:wght@400;700&family=Calibri:wght@400;600;700&family=Times+New+Roman:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Login Page -->
    <div id="loginPage" class="page active">
        <div class="login-box">
            <h1 id="loginTitle">Tutors Valley</h1>
            <p id="loginSubtitle">ঢাকার শহরে আমরাই দিচ্ছি সেরা টিউটর</p>
            
            <button class="btn btn-tutor" onclick="openModal('tutor')">
                <i class="fas fa-chalkboard-teacher"></i> টিউটর লগইন
            </button>
            <button class="btn btn-guardian" onclick="openModal('guardian')">
                <i class="fas fa-user-shield"></i> অভিভাবক লগইন
            </button>
            <button class="btn btn-guest" onclick="guestLogin()">
                <i class="fas fa-user"></i> গেস্ট লগইন
            </button>
            <button class="btn btn-admin" onclick="openModal('admin')">
                <i class="fas fa-user-cog"></i> এডমিন লগইন
            </button>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">লগইন</h2>
            <button class="google-btn" onclick="googleLogin()">
                <i class="fab fa-google"></i> Google দিয়ে লগইন
            </button>
        </div>
    </div>

    <!-- Home Page -->
    <div id="homePage" class="page" style="display:none;">
        <!-- Header -->
        <header class="header" id="headerSection">
            <div class="header-content">
                <div class="logo-section">
                    <img src="" alt="Logo" class="logo" id="logo">
                    <h1 id="branding">Tutors Valley</h1>
                    <p id="motto">ঢাকার শহরে আমরাই দিচ্ছি সেরা টিউটর</p>
                </div>
                <div class="header-actions">
                    <a href="#" class="fb-btn" id="fbBtn">
                        <i class="fab fa-facebook"></i> <span id="fbText">fb page</span>
                    </a>
                    <button class="logout-btn" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> লগআউট
                    </button>
                </div>
            </div>
        </header>

        <!-- Admin Control Icon -->
        <div id="adminIcon" class="admin-icon" onclick="toggleControl()" style="display:none;">
            <i class="fas fa-cog"></i>
        </div>

        <!-- Control Panel -->
        <div id="controlPanel" class="control-panel">
            <div class="control-header">
                <h3>সম্পূর্ণ কন্ট্রোল প্যানেল</h3>
                <span class="close" onclick="toggleControl()">&times;</span>
            </div>
            <div class="control-body" id="controlBody">
                <!-- Content will be loaded by JavaScript -->
            </div>
        </div>

        <!-- Zone Cards -->
        <section class="section" id="zoneSection">
            <h2 class="section-title" id="zoneTitle">আমাদের এলাকা সমূহ</h2>
            <div id="zoneContainer" class="zone-container"></div>
        </section>

        <!-- Reviews -->
        <section class="section" id="reviewSection">
            <h2 class="section-title" id="reviewTitle">রিভিউ সমূহ</h2>
            <div id="reviewBox" class="review-box" style="display:none;">
                <textarea id="reviewText" placeholder="রিভিউ লিখুন..."></textarea>
                <button onclick="submitReview()">জমা দিন</button>
            </div>
            <div id="reviewList" class="review-list"></div>
        </section>

        <!-- CEO -->
        <section class="section ceo-section" id="ceoSection">
            <div class="ceo-card" id="ceoCard">
                <img src="" alt="CEO" class="ceo-img" id="ceoImg">
                <h3 id="ceoName">CEO Name</h3>
                <p id="ceoTitle">Founder & CEO</p>
                <p id="ceoDesc">CEO description here...</p>
            </div>
        </section>

        <footer class="footer" id="footerSection">
            <p id="copyright">&copy; 2026 Tutors Valley. সর্বস্বত্ব সংরক্ষিত।</p>
        </footer>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
