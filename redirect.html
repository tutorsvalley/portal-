<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        /* সবকিছু লুকিয়ে রাখা হয়েছে যাতে কোনো পেজ দেখা না যায় */
        body { margin: 0; padding: 0; background: #fff; overflow: hidden; }
        .hidden { display: none !important; }
        
        /* শুধুমাত্র যদি অটোমেটিক না খোলে তখন এই মেসেজ দেখাবে */
        #fallback-msg {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95);
            z-index: 9999;
            text-align: center;
            font-family: sans-serif;
            padding-top: 20%;
        }
        #fallback-msg h2 { color: #333; margin-bottom: 10px; }
        #fallback-msg p { color: #666; margin-bottom: 20px; }
        .btn {
            display: inline-block;
            padding: 12px 25px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <!-- এই মেসেজটি শুধু তখনই দেখাবে যদি অটোমেটিক ওপেন না হয় -->
    <div id="fallback-msg">
        <h2>ব্রাউজারে যাচ্ছে না?</h2>
        <p>দয়া করে নিচের বাটনে ক্লিক করুন অথবা মেনু থেকে 'Open in Browser' চাপুন।</p>
        <a href="#" id="manual-link" class="btn">ব্রাউজারে খুলুন</a>
    </div>

    <script>
        // URL প্যারামিটার থেকে টার্গেট লিংক নেওয়া
        const params = new URLSearchParams(window.location.search);
        let targetUrl = params.get('url');

        if (!targetUrl) {
            targetUrl = "https://tutorsvalley.github.io/portal-/";
        } else {
            targetUrl = decodeURIComponent(targetUrl);
        }

        // ম্যানুয়াল লিংক সেট করা
        document.getElementById('manual-link').href = targetUrl;

        // ব্রাউজার ওপেন করার ফাংশন
        function forceOpenBrowser() {
            // Android এর জন্য Intent ব্যবহার করে Chrome ওপেন করার চেষ্টা (সবচেয়ে শক্তিশালী পদ্ধতি)
            if (/android/i.test(navigator.userAgent)) {
                try {
                    const cleanUrl = targetUrl.replace(/^https?:\/\//, '');
                    // এটি সরাসরি Chrome অ্যাপটি ওপেন করে দেয়
                    window.location.href = "intent://" + cleanUrl + "#Intent;scheme=https;package=com.android.chrome;end";
                } catch(e) {
                    window.location.href = targetUrl;
                }
            } 
            // iPhone বা অন্য ডিভাইসের জন্য
            else {
                window.location.href = targetUrl;
            }
        }

        // পেজ লোড হওয়ার সাথে সাথে (০ মিলিসেকেন্ডে) চেষ্টা করবে
        window.onload = function() {
            forceOpenBrowser();
        };

        // নিরাপত্তার জন্য আবারও চেষ্টা করবে (১০০ মিলিসেকেন্ড পর)
        setTimeout(function() {
            forceOpenBrowser();
            // যদি এখনো ওপেন না হয়, তাহলে মেসেজ দেখাবে
            document.getElementById('fallback-msg').style.display = 'block';
        }, 100);

    </script>
</body>
</html>
