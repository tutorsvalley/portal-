<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutors Valley</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Hind Siliguri', sans-serif;
            background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
            padding:20px;
        }
        .container{
            background:white;
            padding:40px 30px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
            max-width:400px;
            width:100%;
        }
        .icon{
            font-size:60px;
            margin-bottom:20px;
        }
        h1{
            color:#001f3f;
            font-size:22px;
            margin-bottom:15px;
        }
        p{
            color:#666;
            margin-bottom:25px;
            font-size:15px;
            line-height:1.6;
        }
        .btn{
            background:#0074D9;
            color:white;
            padding:15px 30px;
            border:none;
            border-radius:10px;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            text-decoration:none;
            display:inline-block;
            width:100%;
            margin-bottom:10px;
        }
        .btn:hover{
            background:#0056b3;
        }
        .btn-secondary{
            background:#28a745;
        }
        .btn-secondary:hover{
            background:#218838;
        }
        .note{
            margin-top:20px;
            padding:15px;
            background:#fff3cd;
            border-radius:8px;
            font-size:13px;
            color:#856404;
        }
        .apps{
            margin-top:15px;
            display:flex;
            justify-content:center;
            gap:10px;
            font-size:24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🚀</div>
        <h1>Tutors Valley</h1>
        <p>এই লিংকটি Messenger/Facebook/WhatsApp এ খোলা যাবে না।<br><br>দয়া করে **ব্রাউজারে খুলুন** বাটনে ক্লিক করুন।</p>
        
        <a href="https://tutorsvalley.github.io/portal-/" class="btn" onclick="tryRedirect()">
            🌐 ব্রাউজারে খুলুন
        </a>
        
        <a href="https://tutorsvalley.github.io/portal-/" class="btn btn-secondary" target="_blank">
            📱 নতুন ট্যাবে খুলুন
        </a>
        
        <div class="note">
            ⚠️ **নির্দেশনা:**<br>
            1. উপরের যেকোনো বাটনে ক্লিক করুন<br>
            2. "Open in Browser" সিলেক্ট করুন<br>
            3. অথবা মেনু থেকে "Browser" এ খুলুন
        </div>
        
        <div class="apps">
            <span>📱</span>
            <span>💬</span>
            <span>📘</span>
        </div>
    </div>

    <script>
        const TARGET_URL = "https://tutorsvalley.github.io/portal-/";
        const ua = navigator.userAgent || navigator.vendor || window.opera;
        
        // Detect embedded browsers
        const isFacebook = /FBAN|FBAV/i.test(ua);
        const isMessenger = /Messenger/i.test(ua);
        const isInstagram = /Instagram/i.test(ua);
        const isWhatsApp = /WhatsApp/i.test(ua);
        
        function tryRedirect(){
            // Android Chrome Intent
            if(/Android/i.test(ua)){
                window.location.href = "intent://" + TARGET_URL.replace("https://", "") + "#Intent;scheme=https;package=com.android.chrome;end";
                setTimeout(function(){ window.open(TARGET_URL, '_blank'); }, 500);
            }
            // iOS
            else if(/iPhone|iPad|iPod/i.test(ua)){
                window.open(TARGET_URL, '_blank');
            }
            // Others
            else{
                window.location.href = TARGET_URL;
            }
        }
        
        // Auto try after 1 second
        setTimeout(function(){
            if(isFacebook || isMessenger || isInstagram || isWhatsApp){
                tryRedirect();
            }else{
                window.location.replace(TARGET_URL);
            }
        }, 1000);
    </script>
</body>
</html>
