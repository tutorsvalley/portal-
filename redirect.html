<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
        // URL থেকে মূল লিংকটি নেওয়া
        const urlParams = new URLSearchParams(window.location.search);
        let targetUrl = urlParams.get('url');

        // যদি লিংক না পাওয়া যায়, তবে ডিফল্ট সাইটে পাঠানো
        if (!targetUrl) {
            targetUrl = "https://tutorsvalley.github.io/portal-/";
        } else {
            // ডিকোড করা (কারণ লিংকটি এনকোড করা ছিল)
            targetUrl = decodeURIComponent(targetUrl);
        }

        // ফাংশন যা ব্রাউজার ওপেন করবে
        function openInBrowser() {
            // Android এর জন্য বিশেষ কমান্ড (Chrome ওপেন করবে)
            if (/android/i.test(navigator.userAgent)) {
                try {
                    const cleanUrl = targetUrl.replace(/^https?:\/\//, '');
                    // এটি সরাসরি Chrome অ্যাপটি ওপেন করে দেয়
                    window.location.href = "intent://" + cleanUrl + "#Intent;scheme=https;package=com.android.chrome;end";
                } catch(e) {
                    window.location.href = targetUrl;
                }
            } 
            // iPhone বা অন্য ডিভাইসের জন্য সাধারণ লিংক
            else {
                window.location.href = targetUrl;
            }
        }

        // পেজ লোড হওয়ার সাথে সাথে (০ সেকেন্ডে) রিডিরেক্ট করবে
        window.onload = openInBrowser;
        // নিরাপত্তার জন্য আবারও চেষ্টা করবে যদি প্রথমটা কাজ না করে
        setTimeout(openInBrowser, 100);
    </script>
</head>
<body>
    <!-- কোনো কিছু দেখাবে না, শুধু লোড হবে -->
    <div style="display:none;">Redirecting to browser...</div>
</body>
</html>
